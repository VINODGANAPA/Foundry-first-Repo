{% extends 'base.html' %}
{% block content %}
<h2>Book an Appointment</h2>
<form class="form" method="post" action="{{ url_for('book') }}" novalidate>
  <div class="form-row">
    <label for="full_name">Full Name</label>
    <input id="full_name" name="full_name" type="text" required value="{{ form.get('full_name','') }}" />
  </div>
  <div class="form-row">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required value="{{ form.get('email','') }}" />
  </div>
  <div class="form-row">
    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" required value="{{ form.get('phone','') }}" />
  </div>
  <div class="form-row grid">
    <div>
      <label for="date">Preferred Date</label>
      <input id="date" name="date" type="date" required value="{{ form.get('date','') }}" />
    </div>
    <div>
      <label for="time">Preferred Time</label>
      <input id="time" name="time" type="time" required value="{{ form.get('time','') }}" />
    </div>
  </div>
  <div class="form-row">
    <label for="notes">Notes (optional)</label>
    <textarea id="notes" name="notes" rows="4">{{ form.get('notes','') }}</textarea>
  </div>
  <div class="form-row">
    <button class="btn primary" type="submit">Confirm Booking</button>
  </div>
</form>
{% endblock %}
