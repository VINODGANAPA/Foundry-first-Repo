{% extends 'base.html' %}
{% block content %}
<h2>Learn: The IVF Journey in 3D</h2>
<p class="muted">Interact with the stages below to see a simplified, educational visualization of the IVF process.</p>
<div class="stage-controls">
  <button class="btn" data-stage="0">1. Ovarian Stimulation</button>
  <button class="btn" data-stage="1">2. Egg Retrieval</button>
  <button class="btn" data-stage="2">3. Fertilization</button>
  <button class="btn" data-stage="3">4. Embryo Culture</button>
  <button class="btn" data-stage="4">5. Embryo Transfer</button>
  <button class="btn" data-stage="5">6. Implantation & Gestation</button>
</div>
<div class="learn-layout">
  <canvas id="ivf-canvas" aria-label="IVF 3D visualization" role="img"></canvas>
  <div class="stage-text" id="stage-text"></div>
</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="{{ url_for('static', filename='js/learn.js') }}"></script>
{% endblock %}
